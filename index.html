<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Svensk eHockey</title>
  <meta
    name="description"
    content="Svensk eHockey samlar Svenska eHockey Cupen med matcher, tabeller, lag och spelarstatistik i ett gemensamt arkiv."
  >
  <link rel="icon" type="image/png" href="./SECLOGGA.png">
  <link rel="apple-touch-icon" href="./SECLOGGA.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;700;800&family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=team-history-20260524">
</head>
<body>
  <header class="topbar">
    <div class="container topbar__inner">
      <a class="brand" href="#/" aria-label="Svensk eHockey">
        <img class="brand__logo" src="./SECLOGGA.png" alt="Svensk eHockey">
      </a>

      <nav class="nav" aria-label="Huvudmeny">
        <a class="nav__link is-active" href="#/">Startsida</a>
        <a class="nav__link" href="#/cups">Cuper</a>
        <a class="nav__link" href="#/teams">Lag</a>
        <a class="nav__link" href="#/players">Spelare</a>
        <button class="iconbtn" type="button" aria-label="Sok" title="Sok">S</button>
      </nav>

      <button class="hamburger" type="button" aria-label="Oppna meny" data-mobile-toggle>=</button>
    </div>

    <div class="mobile" data-mobile-menu>
      <div class="container mobile__inner">
        <a class="mobile__link is-active" href="#/">Startsida</a>
        <a class="mobile__link" href="#/cups">Cuper</a>
        <a class="mobile__link" href="#/teams">Lag</a>
        <a class="mobile__link" href="#/players">Spelare</a>
      </div>
    </div>
  </header>

  <div id="sec-bg-layer">
    <div class="smoke-layer smoke-back"></div>
    <div class="smoke-layer"></div>
  </div>

  <div id="sec-page">
    <main id="app-view">
      <section class="sec-loading" aria-live="polite" aria-busy="true">
        <img class="sec-loading__logo" src="./SECLOGGA.png" alt="Svenska eHockey Cupen">
        <div class="sec-loading__spinner" aria-hidden="true"></div>
        <div class="sec-loading__text">
          <strong>Laddar Svenska eHockey Cupen</strong>
          <span>Hämtar cuper, regler och statistik...</span>
        </div>
      </section>
    </main>
  </div>

  <script>
    (function () {
      const mobileBtn = document.querySelector("[data-mobile-toggle]");
      const mobileMenu = document.querySelector("[data-mobile-menu]");

      mobileBtn?.addEventListener("click", function () {
        mobileMenu?.classList.toggle("open");
      });
    })();
  </script>
  <script src="config.js"></script>
  <script src="app.js?v=search-split-20260524"></script>
</body>
</html>
